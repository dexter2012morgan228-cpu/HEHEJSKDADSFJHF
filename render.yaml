services:
  - type: web
    name: sublate-key
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: OWNER_USERNAME
        value: jadexov
      - key: CONFIG_CHANNEL_ID
        sync: false
      - key: LOG_CHANNEL_ID
        sync: false
      - key: ROLE_ON_ACCEPT_ID
        sync: false
      - key: COOLDOWN_HOURS
        value: "12"
      - key: MIN_ACCOUNT_AGE_DAYS
        value: "7"
      - key: KEY_SIGNING_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.7
